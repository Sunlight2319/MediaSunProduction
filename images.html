<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Galerie - SunProduction</title>
<link rel="stylesheet" href="style.css">

<style>
.galerie {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 20px;
}

figure {
    background-color: white;
    padding: 10px;
    border-radius: 10px;
    box-shadow: 0px 4px 8px rgba(0,0,0,0.1);
    text-align: center;
}

figure img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border-radius: 8px;
    transition: transform 0.3s;
}

figure img:hover {
    transform: scale(1.05);
}

figcaption {
    margin-top: 10px;
    font-size: 14px;
    color: #555;
}
</style>

</head>

<body>

<header>
    <h1>📸 SunProduction</h1>
    <p>Photographie & Vidéographie Professionnelle</p>
</header>
