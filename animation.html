<style>
.galerie-animation {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 20px;
    padding: 20px;
}

figure {
    background-color: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0px 4px 8px rgba(0,0,0,0.1);
    text-align: center;
}

.anim {
    width: 80px;
    height: 80px;
    margin: 0 auto 10px auto;
    border-radius: 10px;
}

/* Animation 1: Bouncing Ball */
.bounce { background: red; animation: bounce 2s infinite; }
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-50px); }
}

/* Animation 2: Rotation */
.rotate { background: blue; animation: rotate 2s linear infinite; }
@keyframes rotate {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* Animation 3: Scaling */
.scale { background: green; animation: scale 2s infinite; }
@keyframes scale {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.5); }
}

/* Animation 4: Color Change */
.color { background: purple; animation: colorchange 3s infinite; }
@keyframes colorchange {
  0% { background-color: purple; }
  25% { background-color: orange; }
  50% { background-color: yellow; }
  75% { background-color: pink; }
  100% { background-color: purple; }
}

/* Animation 5: Move Right */
.move { background: teal; animation: moveRight 2s infinite; position: relative; }
@keyframes moveRight {
  0%,100% { left: 0; }
  50% { left: 50px; }
}

/* Les autres animations 6 à 30 peuvent suivre le même principe */
.slideup { background: #f39c12; animation: slideUp 2s infinite; }
@keyframes slideUp { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-30px); } }

.slidedown { background: #8e44ad; animation: slideDown 2s infinite; }
@keyframes slideDown { 0%,100% { transform: translateY(0); } 50% { transform: translateY(30px); } }

.fade { background: #16a085; animation: fade 2s infinite; }
@keyframes fade { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

.pulse { background: #e74c3c; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.2); } }

.flip { background: #3498db; animation: flip 2s infinite; }
@keyframes flip { 0%,100% { transform: rotateY(0deg); } 50% { transform: rotateY(180deg); } }

/* Pour aller jusqu’à 30, on peut dupliquer avec variations de couleur et animation duration */
</style>
</head>
